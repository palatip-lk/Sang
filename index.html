<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SANG | Art Toy</title>

<link rel="stylesheet" href="style.css">
<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body>

<section class="hero">

    <img src="assets/logo/Logo-Black.png"
         class="logo">

    <h1>SANG</h1>

    <h2>Hidden Worth • Revealed Identity</h2>

    <p>
        Inspired by Thailand's timeless folk tale,
        Sang reimagines the legendary hero
        as a collectible designer art toy.
    </p>

    <a href="#preview" class="button">

        Explore Character

    </a>

</section>

<section id="preview">

<h2>Interactive 3D</h2>

<model-viewer

src="assets/models/Sang.glb"

camera-controls

touch-action="pan-y"

auto-rotate

shadow-intensity="1"

exposure="1"

environment-image="neutral"

style="width:100%;height:700px;">

</model-viewer>

</section>

<script src="script.js"></script>

</body>

</html>
